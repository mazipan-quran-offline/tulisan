savePrefix: ''
blockExoticSubdeps: true
minimumReleaseAge: 1440 # In minutes -- 1440 minutes = 1 day
minimumReleaseAgeExclude:
  - webpack@5.107.0
trustPolicy: 'no-downgrade'
trustPolicyExclude:
  - 'semver@5.7.2'
  - 'semver@7.8.0'
allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  core-js: true
  core-js-pure: true
  es5-ext: true
  gatsby: true
  gatsby-cli: true
  lmdb: true
  msgpackr-extract: true
  sharp: true
overrides:
  "semver": "7.8.0"
  "msgpackr": "2.0.1"
  '@parcel/reporter-dev-server': 2.16.4
  '@parcel/core': 2.16.4
  cookie: ^1.1.1
  file-type: ^22.0.1
  immutable: ^5.1.5
  lodash: ^4.18.1
  on-headers: ^1.1.0
  path-to-regexp: ^8.4.2
  serialize-javascript: ^7.0.5
  tmp: ^0.2.5
  webpack: ^5.107.0
  ws: ^8.20.1
